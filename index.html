<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>西宮北口店 キッチン専用AI</title>
    <style>
        :root {
            --bg:       #0d1117;
            --surface:  #161b22;
            --border:   rgba(255,255,255,0.07);
            --text:     #e6edf3;
            --muted:    #768390;
            --orange:   #f97316;
            --red:      #f85149;
            --purple:   #818cf8;
            --green:    #3fb950;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* ─── ヘッダー ─── */
        header {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        header h1 {
            margin: 0;
            font-size: 1rem;
            font-weight: 500;
            color: var(--muted);
            letter-spacing: 0.04em;
        }

        #status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--muted);
        }

        #status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--orange);
            flex-shrink: 0;
            transition: background 0.3s;
        }

        body.recording  #status-dot { background: var(--red);    animation: blink 0.7s ease-in-out infinite; }
        body.processing #status-dot { background: var(--purple);  animation: blink 1.2s ease-in-out infinite; }
        body.success    #status-dot { background: var(--green); }
        body.error      #status-dot { background: var(--red); }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.2; }
        }

        /* ─── 回答表示エリア ─── */
        #display {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 28px 28px 20px;
            gap: 14px;
            text-align: center;
            overflow-y: auto;
        }

        /* ユーザーの発話テキスト */
        #question-text {
            font-size: 1.6rem;
            color: var(--muted);
            line-height: 1.5;
            min-height: 2.5rem;
            transition: opacity 0.3s;
        }

        /* 録音中・処理中のアニメーションコンテナ（それ以外は高さ0で折りたたむ） */
        #anim-container {
            width: 100%;
            height: 0;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: height 0.35s ease;
        }
        body.recording  #anim-container { height: 64px; }
        body.processing #anim-container { height: 64px; }

        #waveform, #loading {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        body.recording  #waveform { opacity: 1; }
        body.processing #loading  { opacity: 1; }

        /* ウェーブフォームバー */
        .wave-bar {
            width: 7px;
            border-radius: 4px;
            background: var(--red);
            animation: wave 0.9s ease-in-out infinite;
        }
        .wave-bar:nth-child(1) { height: 14px; animation-delay: 0.00s; }
        .wave-bar:nth-child(2) { height: 28px; animation-delay: 0.12s; }
        .wave-bar:nth-child(3) { height: 46px; animation-delay: 0.24s; }
        .wave-bar:nth-child(4) { height: 58px; animation-delay: 0.36s; }
        .wave-bar:nth-child(5) { height: 46px; animation-delay: 0.24s; }
        .wave-bar:nth-child(6) { height: 28px; animation-delay: 0.12s; }
        .wave-bar:nth-child(7) { height: 14px; animation-delay: 0.00s; }

        @keyframes wave {
            0%, 100% { transform: scaleY(0.3); opacity: 0.5; }
            50%       { transform: scaleY(1);   opacity: 1; }
        }

        /* ローディングドット（処理中） */
        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--purple);
            animation: bounce 1.2s ease-in-out infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.20s; }
        .dot:nth-child(3) { animation-delay: 0.40s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.45); opacity: 0.35; }
            40%            { transform: scale(1.1);  opacity: 1; }
        }

        /* アクセントライン（状態に応じて色・幅が変化） */
        #accent-line {
            width: 50px;
            height: 4px;
            border-radius: 2px;
            background: var(--orange);
            flex-shrink: 0;
            transition: background 0.4s, width 0.4s;
        }
        body.recording  #accent-line { background: var(--red);    width: 80px; }
        body.processing #accent-line { background: var(--purple);  width: 80px; }
        body.success    #accent-line { background: var(--green);   width: 60px; }
        body.error      #accent-line { background: var(--red);     width: 60px; }

        /* AI回答テキスト（遠くからでも読める極太巨大フォント） */
        #answer-text {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1.25;
            color: var(--text);
            letter-spacing: -0.01em;
            transition: color 0.4s;
        }
        body.recording  #answer-text { font-size: 2.2rem; font-weight: 400; color: var(--muted); }
        body.processing #answer-text { visibility: hidden; }
        body.success    #answer-text { color: var(--green); }
        body.error      #answer-text { color: var(--red); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .answer-animate { animation: fadeUp 0.45s ease forwards; }

        /* ─── ボタンエリア ─── */
        #button-area {
            flex-shrink: 0;
            height: 43vh;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 20px 22px;
        }

        #hint-text {
            flex-shrink: 0;
            margin: 0;
            font-size: 0.85rem;
            color: var(--muted);
            letter-spacing: 0.04em;
        }

        /* 巨大タップ領域ボタン（腕・手の甲でも押せるよう最大化） */
        #mic-button {
            flex: 1;
            min-height: 0;
            width: 100%;
            background: transparent;
            border: none;
            padding: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-radius: 20px;
            transition: transform 0.15s ease;
            touch-action: manipulation; /* iOSのダブルタップズームを無効化 */
        }

        #mic-button:active { transform: scale(0.93); }

        /* 録音中グローリング */
        #mic-button::after {
            content: '';
            position: absolute;
            inset: -12px;
            border-radius: 28px;
            pointer-events: none;
            transition: box-shadow 0.3s, border-color 0.3s;
            border: 3px solid transparent;
        }

        body.recording #mic-button::after {
            border-color: rgba(248, 81, 73, 0.45);
            animation: glow-pulse 0.8s ease-in-out infinite;
        }

        @keyframes glow-pulse {
            0%, 100% { box-shadow: 0 0 30px rgba(248,81,73,0.25), 0 0  70px rgba(248,81,73,0.10); }
            50%       { box-shadow: 0 0 55px rgba(248,81,73,0.55), 0 0 120px rgba(248,81,73,0.22); }
        }

        /* ─── バーガーSVG アニメーション ─── */
        #burger-svg {
            max-height: 100%;
            max-width: 100%;
            height: auto;
            width: auto;
            overflow: visible; /* 持ち上がった上バンズが切れないよう */
            filter: drop-shadow(0 14px 28px rgba(0,0,0,0.6));
            animation: burger-float 3.5s ease-in-out infinite;
            transform-origin: center bottom;
        }

        /* 待機中：緩やかに浮遊 */
        @keyframes burger-float {
            0%, 100% { transform: translateY(0);    filter: drop-shadow(0 14px 28px rgba(0,0,0,0.60)); }
            50%       { transform: translateY(-9px); filter: drop-shadow(0 22px 36px rgba(0,0,0,0.40)); }
        }

        /* 上バンズ：録音時に跳ね上がる（スプリング感のある動き） */
        #top-bun {
            transform-box: fill-box;
            transform-origin: center bottom;
            transition: transform 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        body.recording #top-bun { transform: translateY(-50px); }

        /* 録音中：フロート停止・赤いドロップシャドウ */
        body.recording #burger-svg {
            animation: none;
            filter: drop-shadow(0 0 26px rgba(248,81,73,0.9))
                    drop-shadow(0 14px 28px rgba(0,0,0,0.5));
        }

        /* 録音中：具材がウェーブ状に揺れる */
        #lettuce, #tomato, #cheese, #patty {
            transform-box: fill-box;
            transform-origin: center;
        }
        body.recording #lettuce { animation: ing-wiggle 0.38s ease-in-out infinite; }
        body.recording #tomato  { animation: ing-wiggle 0.38s ease-in-out 0.08s infinite; }
        body.recording #cheese  { animation: ing-wiggle 0.38s ease-in-out 0.16s infinite; }
        body.recording #patty   { animation: ing-wiggle 0.38s ease-in-out 0.24s infinite; }

        @keyframes ing-wiggle {
            0%, 100% { transform: translateX(0); }
            35%       { transform: translateX(-4px); }
            70%       { transform: translateX(4px); }
        }

        /* 録音中：スチームが立ち上る */
        .s-puff {
            fill: rgba(255, 245, 220, 0.75);
            opacity: 0;
        }
        body.recording .s-puff                  { animation: steam-rise 2s ease-out infinite; }
        body.recording .s-puff:nth-child(2)     { animation-delay: 0.67s; }
        body.recording .s-puff:nth-child(3)     { animation-delay: 1.33s; }

        @keyframes steam-rise {
            0%   { transform: translateY(0)     scale(1);   opacity: 0.8; }
            70%  { transform: translateY(-52px)  scale(2);   opacity: 0.3; }
            100% { transform: translateY(-68px)  scale(2.6); opacity: 0; }
        }

        /* 処理中：左右に思案する揺れ */
        body.processing #burger-svg {
            animation: think-rock 1.8s ease-in-out infinite;
            transform-origin: center bottom;
        }
        @keyframes think-rock {
            0%, 100% { transform: rotate(0deg) translateY(0); }
            25%       { transform: rotate(-4.5deg) translateY(-4px); }
            75%       { transform: rotate(4.5deg) translateY(-4px); }
        }

        /* 押下時：スカッシュ変形（つぶれる感触） */
        #mic-button:active #burger-svg {
            animation: squish 0.22s ease;
            transform-origin: center bottom;
        }
        @keyframes squish {
            0%   { transform: scaleY(1)    scaleX(1); }
            38%  { transform: scaleY(0.78) scaleX(1.10); }
            100% { transform: scaleY(1)    scaleX(1); }
        }

        /* 完了：うれしそうに弾むジャンプ */
        body.success #burger-svg {
            animation: success-jump 0.75s cubic-bezier(0.36, 0.07, 0.19, 0.97);
            transform-origin: center bottom;
        }
        @keyframes success-jump {
            0%   { transform: translateY(0)     scale(1,    1); }
            18%  { transform: translateY(-32px)  scale(0.95, 1.06); }
            36%  { transform: translateY(-20px)  scale(1.05, 0.95); }
            54%  { transform: translateY(-25px)  scale(0.98, 1.03); }
            72%  { transform: translateY(-8px)   scale(1.01, 0.99); }
            100% { transform: translateY(0)      scale(1,    1); }
        }

        /* エラー：首を振る */
        body.error #burger-svg {
            animation: error-shake 0.55s ease;
            transform-origin: center bottom;
        }
        @keyframes error-shake {
            0%, 100% { transform: translateX(0)    rotate(0deg); }
            15%       { transform: translateX(-16px) rotate(-4deg); }
            30%       { transform: translateX(16px)  rotate(4deg); }
            45%       { transform: translateX(-10px) rotate(-2.5deg); }
            60%       { transform: translateX(10px)  rotate(2.5deg); }
            75%       { transform: translateX(-5px)  rotate(-1deg); }
        }
    </style>
</head>
<body>

    <header>
        <h1>西宮北口店 キッチン専用AI</h1>
        <div id="status">
            <div id="status-dot"></div>
            <span id="status-label">待機中</span>
        </div>
    </header>

    <div id="display">
        <div id="question-text">バーガーを押して話しかけてください</div>

        <div id="anim-container">
            <div id="waveform">
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
            </div>
            <div id="loading">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <div id="accent-line"></div>

        <div id="answer-text">下のバーガーを押して<br>話しかけてください</div>
    </div>

    <div id="button-area">
        <p id="hint-text">腕や手の甲でタップできます</p>
        <button id="mic-button" aria-label="タップして質問">
            <svg id="burger-svg" viewBox="0 0 240 216" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <defs>
                    <!-- 上バンズ：3段階グラデーション（明→中→暗） -->
                    <radialGradient id="rg-top" cx="36%" cy="26%" r="68%">
                        <stop offset="0%"   stop-color="#ffe898"/>
                        <stop offset="42%"  stop-color="#f5a832"/>
                        <stop offset="100%" stop-color="#b86412"/>
                    </radialGradient>
                    <!-- 下バンズ：やや暗め -->
                    <radialGradient id="rg-bot" cx="36%" cy="24%" r="70%">
                        <stop offset="0%"   stop-color="#f8d468"/>
                        <stop offset="42%"  stop-color="#e09028"/>
                        <stop offset="100%" stop-color="#a05808"/>
                    </radialGradient>
                    <!-- パティ：焦げ感のあるグラデーション -->
                    <radialGradient id="rg-patty" cx="36%" cy="20%" r="72%">
                        <stop offset="0%"   stop-color="#b06840"/>
                        <stop offset="50%"  stop-color="#7a3818"/>
                        <stop offset="100%" stop-color="#381408"/>
                    </radialGradient>
                    <!-- チーズ：鮮やかな黄色 -->
                    <linearGradient id="lg-cheese" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%"   stop-color="#ffe448"/>
                        <stop offset="100%" stop-color="#d88e08"/>
                    </linearGradient>
                    <!-- トマト：鮮やかな赤 -->
                    <linearGradient id="lg-tomato" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%"   stop-color="#ff6855"/>
                        <stop offset="100%" stop-color="#c41c10"/>
                    </linearGradient>
                </defs>

                <!-- グラウンドシャドウ（常時表示・静止） -->
                <ellipse cx="120" cy="210" rx="88" ry="6" fill="rgba(0,0,0,0.28)"/>

                <!-- スチームパフ（録音中のみ立ち上る） -->
                <g id="steam">
                    <circle class="s-puff" cx="80"  cy="108" r="5.5"/>
                    <circle class="s-puff" cx="120" cy="102" r="6.5"/>
                    <circle class="s-puff" cx="160" cy="108" r="5.5"/>
                </g>

                <!-- 下バンズ -->
                <g id="bot-bun">
                    <ellipse cx="120" cy="192" rx="92" ry="18" fill="url(#rg-bot)"/>
                    <!-- トップ面のハイライト -->
                    <ellipse cx="120" cy="181" rx="86" ry="12" fill="#f8d468"/>
                    <ellipse cx="120" cy="179" rx="68" ry="6"  fill="rgba(255,255,255,0.15)"/>
                </g>

                <!-- パティ -->
                <g id="patty">
                    <ellipse cx="120" cy="166" rx="86" ry="18" fill="url(#rg-patty)"/>
                    <!-- 上面（明るめ） -->
                    <ellipse cx="120" cy="157" rx="80" ry="12" fill="#8a4020"/>
                    <!-- グリル跡 2本 -->
                    <path d="M58,157 Q82,153 106,157"  stroke="#2e1005" stroke-width="3.5" fill="none" stroke-linecap="round"/>
                    <path d="M126,157 Q150,153 174,157" stroke="#2e1005" stroke-width="3.5" fill="none" stroke-linecap="round"/>
                    <!-- 上縁の微細な光沢 -->
                    <ellipse cx="120" cy="154" rx="56" ry="4" fill="rgba(190,110,55,0.35)"/>
                </g>

                <!-- チーズ -->
                <g id="cheese">
                    <path d="M22,138 L218,138 L218,150 Q206,163 192,150 L48,150 Q34,163 22,150 Z" fill="url(#lg-cheese)"/>
                    <!-- 上縁の明るいハイライト -->
                    <rect x="22" y="138" width="196" height="6" fill="#fff070" rx="1"/>
                </g>

                <!-- トマト -->
                <g id="tomato">
                    <ellipse cx="120" cy="127" rx="86" ry="12" fill="url(#lg-tomato)"/>
                    <!-- 光沢ハイライト -->
                    <ellipse cx="106" cy="122" rx="48" ry="5" fill="rgba(255,255,255,0.22)" transform="rotate(-5 106 122)"/>
                </g>

                <!-- レタス（3層で奥行きを演出） -->
                <g id="lettuce">
                    <!-- 最奥層（暗） -->
                    <path d="M20,109 Q33,97 48,106 Q61,97 76,106 Q89,97 104,106 Q117,97 132,106 Q145,97 160,106 Q173,97 188,106 Q201,97 216,106 L220,113 L20,113 Z" fill="#1a7a1a"/>
                    <!-- 中間層 -->
                    <path d="M20,112 Q33,100 48,109 Q61,100 76,109 Q89,100 104,109 Q117,100 132,109 Q145,100 160,109 Q173,100 188,109 Q201,100 216,109 L220,116 L20,116 Z" fill="#2eaa2e"/>
                    <!-- 前面層（明・半透明） -->
                    <path d="M20,115 Q33,103 48,112 Q61,103 76,112 Q89,103 104,112 Q117,103 132,112 Q145,103 160,112 Q173,103 188,112 Q201,103 216,112 L220,119 L20,119 Z" fill="#3fcc3f" opacity="0.50"/>
                </g>

                <!-- 上バンズ（録音中に持ち上がる） -->
                <g id="top-bun">
                    <!-- ドーム本体 -->
                    <ellipse cx="120" cy="61" rx="90" ry="54" fill="url(#rg-top)"/>
                    <!-- メイン光沢（大・斜め） -->
                    <ellipse cx="92" cy="38" rx="42" ry="18" fill="rgba(255,255,255,0.22)" transform="rotate(-15 92 38)"/>
                    <!-- サブ光沢（小・右下） -->
                    <ellipse cx="150" cy="76" rx="14" ry="6" fill="rgba(255,255,255,0.08)" transform="rotate(10 150 76)"/>
                    <!-- ゴマ（本体） -->
                    <ellipse cx="84"  cy="39"  rx="10"  ry="5"   fill="#9a5810" transform="rotate(-28 84 39)"/>
                    <ellipse cx="117" cy="22"  rx="10"  ry="5"   fill="#9a5810" transform="rotate(-5 117 22)"/>
                    <ellipse cx="152" cy="37"  rx="10"  ry="5"   fill="#9a5810" transform="rotate(22 152 37)"/>
                    <ellipse cx="98"  cy="59"  rx="8.5" ry="4.5" fill="#9a5810" transform="rotate(-20 98 59)"/>
                    <ellipse cx="134" cy="55"  rx="8.5" ry="4.5" fill="#9a5810" transform="rotate(13 134 55)"/>
                    <!-- ゴマ（光沢ハイライト） -->
                    <ellipse cx="82"  cy="37"  rx="5"   ry="2"   fill="rgba(255,215,100,0.55)" transform="rotate(-28 82 37)"/>
                    <ellipse cx="115" cy="20"  rx="5"   ry="2"   fill="rgba(255,215,100,0.55)" transform="rotate(-5 115 20)"/>
                    <ellipse cx="150" cy="35"  rx="5"   ry="2"   fill="rgba(255,215,100,0.55)" transform="rotate(22 150 35)"/>
                    <ellipse cx="96"  cy="57"  rx="4.2" ry="1.8" fill="rgba(255,215,100,0.55)" transform="rotate(-20 96 57)"/>
                    <ellipse cx="132" cy="53"  rx="4.2" ry="1.8" fill="rgba(255,215,100,0.55)" transform="rotate(13 132 53)"/>
                </g>
            </svg>
        </button>
    </div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        // ==========================================
        // 【設定】miibo APIの情報
        // ==========================================
        const MIIBO_API_KEY  = "4774d7f7-de41-4e7a-8867-ba82e0c8ce0b19c9f440c7f259";
        const MIIBO_AGENT_ID = "f05e2478-566d-4979-80c3-36eb0b21cc0119c95864995fb";
        // ==========================================

        const body        = document.body;
        const micButton   = document.getElementById('mic-button');
        const questionEl  = document.getElementById('question-text');
        const answerEl    = document.getElementById('answer-text');
        const statusLabel = document.getElementById('status-label');

        const LABELS = {
            idle:       '待機中',
            recording:  '聞き取り中',
            processing: 'AIが確認中',
            success:    '完了',
            error:      'エラー',
        };

        // アイドル画面の定型文
        const IDLE = {
            question: 'バーガーを押して話しかけてください',
            answer:   '下のバーガーを押して<br>話しかけてください',
        };

        let currentState    = 'idle';
        let resetTimer      = null;
        let wakeLockSentinel = null;

        // ── Wake Lock：画面スリープを防止 ──────────────────────
        async function requestWakeLock() {
            if (!('wakeLock' in navigator)) return;
            try {
                wakeLockSentinel = await navigator.wakeLock.request('screen');
            } catch (e) {
                console.warn('Wake Lock 取得失敗:', e);
            }
        }
        // タブが前面に戻ったとき（iOS/Androidはバックグラウンドで自動解除される）に再取得
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && wakeLockSentinel?.released) {
                requestWakeLock();
            }
        });
        requestWakeLock();

        // ── 起動時マイク権限チェック（プロンプトを出さずに確認） ──
        if (navigator.permissions) {
            navigator.permissions.query({ name: 'microphone' })
                .then(status => {
                    if (status.state === 'denied') {
                        setState('error', {
                            question: 'マイクへのアクセスが拒否されています',
                            answer:   'ブラウザの設定から<br>マイクを許可してください',
                        });
                    }
                    // ブラウザ設定で許可に変更されたら自動復帰
                    status.onchange = () => {
                        if (status.state === 'granted' && currentState === 'error') {
                            setState('idle', IDLE);
                        }
                    };
                })
                .catch(() => {}); // 非対応ブラウザは無視
        }

        // ── 回答フォント自動スケーリング ─────────────────────────
        // 長い回答でもディスプレイから溢れないよう文字数に応じてサイズを調整
        function autoScaleAnswer() {
            const len = answerEl.textContent.length;
            if      (len <= 14) answerEl.style.fontSize = '4rem';
            else if (len <= 28) answerEl.style.fontSize = '3rem';
            else if (len <= 45) answerEl.style.fontSize = '2.2rem';
            else                answerEl.style.fontSize = '1.7rem';
        }

        function setState(state, opts = {}) {
            if (resetTimer) { clearTimeout(resetTimer); resetTimer = null; }

            currentState = state;
            body.className = state;
            statusLabel.textContent = LABELS[state];

            // success/error 以外ではインラインfont-sizeをリセット（CSS側に委ねる）
            if (state !== 'success' && state !== 'error') {
                answerEl.style.fontSize = '';
            }

            if (opts.question !== undefined) {
                questionEl.innerHTML = opts.question;
            }

            if (opts.answer !== undefined) {
                answerEl.classList.remove('answer-animate');
                void answerEl.offsetWidth; // リフロー強制（アニメーション再起動）
                answerEl.innerHTML = opts.answer;
                if (state === 'success' || state === 'error') {
                    autoScaleAnswer();
                    answerEl.classList.add('answer-animate');
                }
            }
        }

        // 初期表示
        setState('idle', IDLE);

        if (!SpeechRecognition) {
            setState('error', {
                question: 'ブラウザ非対応',
                answer:   'お使いのブラウザは<br>音声認識に非対応です。<br>Chrome / Safari をご利用ください。',
            });
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang            = 'ja-JP';
            recognition.interimResults  = false;
            recognition.maxAlternatives = 1;

            let isRecording = false;

            micButton.addEventListener('click', () => {
                if (isRecording) {
                    recognition.stop();
                } else {
                    try { recognition.start(); }
                    catch (e) { console.error('音声認識の開始に失敗しました:', e); }
                }
            });

            // 録音開始
            recognition.onstart = () => {
                isRecording = true;
                setState('recording', {
                    question: '...',
                    answer:   '聞き取り中...',
                });
            };

            // 音声認識結果
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                questionEl.innerHTML = `「${transcript}」`;
                callMiiboAPI(transcript);
            };

            // 録音終了（結果なしで終わった場合はアイドルへ戻す）
            recognition.onend = () => {
                isRecording = false;
                if (currentState === 'recording') {
                    setState('idle', IDLE);
                }
            };

            // エラー（種類別に詳細メッセージ）
            recognition.onerror = (event) => {
                isRecording = false;
                console.error('🎙️ 音声認識エラー種別:', event.error, event);

                // aborted（ユーザーがキャンセル）は静かにアイドルへ
                if (event.error === 'aborted') {
                    if (currentState === 'recording') setState('idle', IDLE);
                    return;
                }

                // エラー種別 → 日本語メッセージのマッピング
                const ERROR_MAP = {
                    // ── マイク権限系 ──
                    'not-allowed': [
                        'マイクへのアクセスが<br>拒否されています。',
                        'ブラウザの設定から<br>マイクを許可してください。',
                        15000,
                    ],
                    'service-not-allowed': [
                        'マイクへのアクセスが<br>拒否されています。',
                        'ページをHTTPSで開くか<br>ブラウザの設定を確認してください。',
                        15000,
                    ],
                    // ── ハードウェア系 ──
                    'audio-capture': [
                        'マイクが見つかりません。',
                        'タブレットのマイク設定を<br>確認してください。',
                        8000,
                    ],
                    // ── ネットワーク系 ──
                    'network': [
                        'ネットワークエラー。',
                        'Wi-Fi接続を確認してください。<br>（音声認識にはWi-Fiが必要です）',
                        8000,
                    ],
                    // ── 音声未検出 ──
                    'no-speech': [
                        '声が聞こえませんでした。',
                        'もう少し大きな声で<br>もう一度押してください。',
                        5000,
                    ],
                };

                const [question, answer, delay] = ERROR_MAP[event.error] ?? [
                    `エラー: ${event.error}`,
                    'もう一度お試しください。',
                    6000,
                ];

                setState('error', { question, answer });
                resetTimer = setTimeout(() => setState('idle', IDLE), delay);
            };

            // miibo API 呼び出し（15秒タイムアウト付き）
            async function callMiiboAPI(question) {
                setState('processing', { answer: '' });

                const controller = new AbortController();
                const timeoutId  = setTimeout(() => controller.abort(), 15000);

                try {
                    const res = await fetch('https://api-mebo.dev/api', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        signal: controller.signal,
                        body: JSON.stringify({
                            api_key:   MIIBO_API_KEY,
                            agent_id:  MIIBO_AGENT_ID,
                            utterance: question,
                            uid:       'nishinomiya_kitchen_tablet_01',
                        }),
                    });
                    clearTimeout(timeoutId);

                    if (!res.ok) throw new Error(`HTTP ${res.status}`);

                    const data   = await res.json();
                    const answer = data.bestResponse.utterance;

                    setState('success', { answer });

                    // 音声読み上げ
                    const utterance = new SpeechSynthesisUtterance(answer);
                    utterance.lang = 'ja-JP';
                    utterance.rate = 1.1;
                    window.speechSynthesis.speak(utterance);

                } catch (err) {
                    clearTimeout(timeoutId);
                    console.error('API Error:', err);
                    const msg = err.name === 'AbortError'
                        ? '応答がタイムアウトしました。<br>もう一度押してください。'
                        : '通信エラーが発生しました。<br>Wi-Fiを確認してください。';
                    setState('error', { answer: msg });
                    resetTimer = setTimeout(() => setState('idle', IDLE), 8000);
                }
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>西宮北口店 キッチン専用AI</title>
    <style>
        :root {
            --bg:     #ffffff;
            --text:   #0f172a;
            --dim:    rgba(15,23,42,0.45);
            --muted:  #64748b;
            --orange: #ea6c00;
            --red:    #dc2626;
            --purple: #6d28d9;
            --green:  #059669;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0;
        }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, 'Helvetica Neue', Arial,
                         'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ── FULL-SCREEN TAP BUTTON ─────────────────────────────── */
        #mic-button {
            position: fixed; inset: 0;
            background: none; border: none;
            cursor: pointer;
            touch-action: manipulation;
            z-index: 10;
        }

        /* ── STATUS PILL ─────────────────────────────────────────── */
        #status {
            position: fixed; top: 16px; right: 18px;
            display: flex; align-items: center; gap: 8px;
            padding: 7px 16px; border-radius: 100px;
            background: rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.10);
            font-size: 0.9rem; color: #475569;
            font-weight: 600; letter-spacing: 0.05em;
            z-index: 100;
        }
        #status-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--orange); flex-shrink: 0;
            transition: background 0.3s;
        }
        body.recording  #status-dot { background: var(--red);    animation: blink 0.7s  ease-in-out infinite; }
        body.processing #status-dot { background: var(--purple);  animation: blink 1.2s ease-in-out infinite; }
        body.success    #status-dot { background: var(--green); }
        body.error      #status-dot { background: var(--red); }
        @keyframes blink {
            0%,100% { opacity: 1; }
            50%     { opacity: 0.08; }
        }

        /* ── STORE LABEL ─────────────────────────────────────────── */
        #store-label {
            position: fixed; top: 20px; left: 20px;
            font-size: 1.05rem; font-weight: 700;
            color: #334155; letter-spacing: 0.04em;
            z-index: 100;
        }

        /* ── VIGNETTE (shown during answer) ─────────────────────── */
        #vignette {
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at 50% 35%,
                transparent 25%, rgba(203,213,225,0.35) 100%);
            pointer-events: none;
            opacity: 0; z-index: 45;
            transition: opacity 0.55s ease;
        }
        body.success #vignette,
        body.error   #vignette { opacity: 1; }

        /* ── ANSWER OVERLAY ──────────────────────────────────────── */
        #answer-overlay {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 60px 36px 0; /* pb set dynamically by JS */
            text-align: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 50;
        }
        body.success #answer-overlay,
        body.error   #answer-overlay { opacity: 1; }

        #question-text {
            font-size: 1rem; color: var(--muted);
            margin-bottom: 18px; line-height: 1.5;
        }
        #answer-text {
            font-size: 3.8rem; font-weight: 800;
            line-height: 1.2; letter-spacing: -0.025em;
            color: var(--text); word-break: break-word;
            transition: color 0.3s;
        }
        body.error #answer-text { color: var(--red); }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(22px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .answer-animate { animation: fadeSlideUp 0.5s cubic-bezier(0.22,1,0.36,1) forwards; }

        /* ── ANSWER LIST FORMATTING ──────────────────────────────── */
        #answer-text.is-list {
            text-align: left;
            width: min(700px, 88vw);
            letter-spacing: 0;
        }
        .al-hdr {
            display: block;
            font-size: 0.5em;
            font-weight: 500;
            color: var(--muted);
            letter-spacing: 0.03em;
            margin-bottom: 0.6em;
            line-height: 1.45;
        }
        .al-item {
            display: flex;
            align-items: flex-start;
            gap: 0.5em;
            margin-bottom: 0.32em;
            line-height: 1.35;
        }
        .al-item:last-child { margin-bottom: 0; }
        .al-num {
            flex-shrink: 0;
            min-width: 1.45em; height: 1.45em;
            border-radius: 50%;
            background: var(--orange);
            color: #000;
            font-size: 0.52em;
            font-weight: 900;
            display: flex; align-items: center; justify-content: center;
            margin-top: 0.2em;
        }
        .al-bul {
            flex-shrink: 0;
            color: var(--orange);
            font-size: 0.75em;
            margin-top: 0.08em;
            line-height: 1.5;
        }
        .al-txt { flex: 1; }

        /* ── FLOATING LABELS (positioned by JS) ─────────────────── */
        .float-label {
            position: fixed; left: 50%; transform: translateX(-50%);
            z-index: 60; pointer-events: none;
            transition: opacity 0.3s;
        }
        #transcript {
            font-size: 1.2rem; color: var(--dim);
            text-align: center; max-width: 88vw;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            opacity: 0;
        }
        body.recording #transcript { opacity: 1; }

        #hint {
            font-size: 1.05rem; color: #475569;
            letter-spacing: 0.07em; white-space: nowrap;
            text-align: center; opacity: 0;
        }
        body.idle #hint { opacity: 1; }

        /* ── PROCESSING DOTS ─────────────────────────────────────── */
        #processing-dots {
            display: flex; gap: 10px;
            opacity: 0; transition: opacity 0.3s;
        }
        body.processing #processing-dots { opacity: 1; }
        #processing-dots span {
            width: 9px; height: 9px; border-radius: 50%;
            background: var(--purple);
            animation: dot-pulse 1.4s ease-in-out infinite;
        }
        #processing-dots span:nth-child(2) { animation-delay: 0.2s; }
        #processing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot-pulse {
            0%,80%,100% { transform: scale(0.5);  opacity: 0.15; }
            40%         { transform: scale(1);    opacity: 1; }
        }

        /* ── BURGER ZONE ─────────────────────────────────────────── */
        #burger-zone {
            position: fixed; z-index: 20; pointer-events: none;
            transition:
                top    0.68s cubic-bezier(0.34, 1.18, 0.64, 1),
                left   0.62s cubic-bezier(0.34, 1.18, 0.64, 1),
                width  0.62s cubic-bezier(0.34, 1.18, 0.64, 1),
                height 0.62s cubic-bezier(0.34, 1.18, 0.64, 1);
        }

        /* ── BURGER SVG ──────────────────────────────────────────── */
        #burger-svg {
            width: 100%; height: 100%; overflow: visible;
            filter: drop-shadow(0 18px 38px rgba(0,0,0,0.72));
            animation: burger-float 3.5s ease-in-out infinite;
            transform-origin: center bottom;
        }
        @keyframes burger-float {
            0%,100% { transform: translateY(0);     filter: drop-shadow(0 16px 32px rgba(0,0,0,0.18)); }
            50%     { transform: translateY(-10px);  filter: drop-shadow(0 24px 42px rgba(0,0,0,0.12)); }
        }

        /* recording */
        body.recording #burger-svg {
            animation: none;
            filter: drop-shadow(0 0 28px rgba(220,38,38,0.55))
                    drop-shadow(0 14px 28px rgba(0,0,0,0.15));
        }

        /* processing */
        body.processing #burger-svg {
            animation: think-rock 1.8s ease-in-out infinite;
            transform-origin: center bottom;
        }
        @keyframes think-rock {
            0%,100% { transform: rotate(0deg)    translateY(0); }
            25%     { transform: rotate(-4.5deg) translateY(-4px); }
            75%     { transform: rotate(4.5deg)  translateY(-4px); }
        }

        /* success */
        body.success #burger-svg {
            animation: success-jump 0.75s cubic-bezier(0.36,0.07,0.19,0.97) forwards;
            transform-origin: center bottom;
        }
        @keyframes success-jump {
            0%   { transform: translateY(0)     scale(1,    1); }
            18%  { transform: translateY(-32px)  scale(0.95, 1.06); }
            36%  { transform: translateY(-20px)  scale(1.05, 0.95); }
            54%  { transform: translateY(-25px)  scale(0.98, 1.03); }
            72%  { transform: translateY(-8px)   scale(1.01, 0.99); }
            100% { transform: translateY(0)      scale(1,    1); }
        }

        /* error */
        body.error #burger-svg {
            animation: error-shake 0.55s ease;
            transform-origin: center bottom;
        }
        @keyframes error-shake {
            0%,100% { transform: translateX(0)    rotate(0deg); }
            15%     { transform: translateX(-16px) rotate(-4deg); }
            30%     { transform: translateX(16px)  rotate(4deg); }
            45%     { transform: translateX(-10px) rotate(-2.5deg); }
            60%     { transform: translateX(10px)  rotate(2.5deg); }
            75%     { transform: translateX(-5px)  rotate(-1deg); }
        }

        /* tap squish (idle / success / error only) */
        body.idle.pressing    #burger-svg,
        body.success.pressing #burger-svg,
        body.error.pressing   #burger-svg {
            animation: squish 0.22s ease !important;
            transform-origin: center bottom;
        }
        @keyframes squish {
            0%   { transform: scaleY(1)    scaleX(1); }
            38%  { transform: scaleY(0.78) scaleX(1.10); }
            100% { transform: scaleY(1)    scaleX(1); }
        }

        /* ── INGREDIENTS ─────────────────────────────────────────── */
        #top-bun {
            transform-box: fill-box;
            transform-origin: center bottom;
            transition: transform 0.55s cubic-bezier(0.34,1.56,0.64,1);
        }
        body.recording #top-bun { transform: translateY(-50px); }

        #lettuce, #tomato, #cheese, #patty {
            transform-box: fill-box; transform-origin: center;
        }
        body.recording #lettuce { animation: ing-wiggle 0.38s ease-in-out          infinite; }
        body.recording #tomato  { animation: ing-wiggle 0.38s ease-in-out 0.08s   infinite; }
        body.recording #cheese  { animation: ing-wiggle 0.38s ease-in-out 0.16s   infinite; }
        body.recording #patty   { animation: ing-wiggle 0.38s ease-in-out 0.24s   infinite; }
        @keyframes ing-wiggle {
            0%,100% { transform: translateX(0); }
            35%     { transform: translateX(-4px); }
            70%     { transform: translateX(4px); }
        }

        .s-puff { fill: rgba(160,120,70,0.55); opacity: 0; }
        body.recording .s-puff              { animation: steam-rise 2s ease-out infinite; }
        body.recording .s-puff:nth-child(2) { animation-delay: 0.67s; }
        body.recording .s-puff:nth-child(3) { animation-delay: 1.33s; }
        @keyframes steam-rise {
            0%   { transform: translateY(0)     scale(1);   opacity: 0.8; }
            70%  { transform: translateY(-52px)  scale(2);   opacity: 0.3; }
            100% { transform: translateY(-68px)  scale(2.6); opacity: 0; }
        }
    </style>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        // ==========================================
        // 【設定】miibo APIの情報
        // ==========================================
        const MIIBO_API_KEY  = "4774d7f7-de41-4e7a-8867-ba82e0c8ce0b19c9f440c7f259";
        const MIIBO_AGENT_ID = "f05e2478-566d-4979-80c3-36eb0b21cc0119c95864995fb";
        // ==========================================

        const body           = document.body;
        const micButton      = document.getElementById('mic-button');
        const statusLabel    = document.getElementById('status-label');
        const answerOverlay  = document.getElementById('answer-overlay');
        const questionEl     = document.getElementById('question-text');
        const answerEl       = document.getElementById('answer-text');
        const transcriptEl   = document.getElementById('transcript');
        const hintEl         = document.getElementById('hint');
        const processingDots = document.getElementById('processing-dots');
        const burgerZone     = document.getElementById('burger-zone');

        const LABELS = {
            idle: '待機中', recording: '聞き取り中',
            processing: 'AIが確認中', success: '完了', error: 'エラー',
        };

        const STATE_CLASSES = ['idle', 'recording', 'processing', 'success', 'error'];

        let currentState     = 'idle';
        let resetTimer       = null;
        let wakeLockSentinel = null;
        let lastQuestion     = '';

        // ── Layout ──────────────────────────────────────────────────
        function positionBurger(answered) {
            const W    = window.innerWidth;
            const H    = window.innerHeight;
            const vmin = Math.min(W, H);

            let size, top;
            if (answered) {
                size = vmin * 0.30;
                top  = H - size - 44;
            } else {
                size = vmin * 0.60;
                top  = H / 2 - size * 0.52;
            }

            burgerZone.style.width  = size + 'px';
            burgerZone.style.height = size + 'px';
            burgerZone.style.left   = (W / 2 - size / 2) + 'px';
            burgerZone.style.top    = top + 'px';
        }

        function positionFloating() {
            const zoneTop    = parseFloat(burgerZone.style.top)    || 0;
            const zoneHeight = parseFloat(burgerZone.style.height) || 0;
            const aboveY     = Math.max(zoneTop - 72, 56);

            hintEl.style.top         = (zoneTop + zoneHeight + 28) + 'px';
            transcriptEl.style.top   = aboveY + 'px';
            processingDots.style.top = aboveY + 'px';
        }

        function updateAnswerPadding() {
            const burgerTop = parseFloat(burgerZone.style.top) || 0;
            const H         = window.innerHeight;
            answerOverlay.style.paddingBottom = (H - burgerTop + 16) + 'px';
        }

        function layout(answered) {
            positionBurger(answered);
            requestAnimationFrame(() => {
                positionFloating();
                if (answered) updateAnswerPadding();
            });
        }

        window.addEventListener('resize', () => {
            const answered = currentState === 'success' || currentState === 'error';
            layout(answered);
        });

        // ── Answer text formatter ────────────────────────────────────
        function formatAnswer(raw) {
            const lines = raw.replace(/\\n/g, '\n').split(/\n/).map(l => l.trim()).filter(Boolean);
            if (lines.length <= 1) return raw;

            const hasListItems = lines.some(l =>
                /^[\d]+[.．、\)）]\s/.test(l) || /^[・\-•]\s/.test(l)
            );
            if (!hasListItems) return lines.join('<br>');

            return lines.map(line => {
                const numMatch = line.match(/^(\d+)[.．、\)）]\s+([\s\S]*)/);
                if (numMatch)
                    return `<div class="al-item"><span class="al-num">${numMatch[1]}</span><span class="al-txt">${numMatch[2]}</span></div>`;

                const bulMatch = line.match(/^[・\-•]\s+([\s\S]*)/);
                if (bulMatch)
                    return `<div class="al-item"><span class="al-bul">▸</span><span class="al-txt">${bulMatch[1]}</span></div>`;

                return `<span class="al-hdr">${line}</span>`;
            }).join('');
        }

        // ── Answer font auto-scale ───────────────────────────────────
        function autoScaleAnswer() {
            const isList    = answerEl.classList.contains('is-list');
            const itemCount = isList ? answerEl.querySelectorAll('.al-item').length : 0;
            const len       = answerEl.textContent.length;

            if (isList) {
                answerEl.style.fontSize =
                    itemCount <= 3 ? '2.6rem' :
                    itemCount <= 5 ? '2.0rem' : '1.6rem';
            } else {
                answerEl.style.fontSize =
                    len <= 12 ? '4.2rem' :
                    len <= 24 ? '3.2rem' :
                    len <= 40 ? '2.4rem' : '1.8rem';
            }
        }

        // ── State machine ────────────────────────────────────────────
        function setState(state, opts = {}) {
            if (resetTimer) { clearTimeout(resetTimer); resetTimer = null; }

            currentState = state;
            STATE_CLASSES.forEach(s => body.classList.remove(s));
            body.classList.add(state);
            statusLabel.textContent = LABELS[state];

            const answered = state === 'success' || state === 'error';
            layout(answered);

            if (!answered) {
                answerEl.style.fontSize = '';
                answerEl.classList.remove('is-list');
            }

            if (opts.question !== undefined) questionEl.innerHTML = opts.question;

            if (opts.answer !== undefined) {
                answerEl.classList.remove('answer-animate', 'is-list');
                void answerEl.offsetWidth;
                answerEl.innerHTML = opts.answer;
                if (answerEl.querySelector('.al-item')) answerEl.classList.add('is-list');
                if (answered) {
                    autoScaleAnswer();
                    answerEl.classList.add('answer-animate');
                }
            }
        }

        // ── Initial render ───────────────────────────────────────────
        positionBurger(false);
        requestAnimationFrame(positionFloating);
        setState('idle', { question: '', answer: '' });

        // ── Tap feedback ─────────────────────────────────────────────
        micButton.addEventListener('pointerdown', () => body.classList.add('pressing'));
        ['pointerup', 'pointercancel', 'pointerleave'].forEach(e =>
            micButton.addEventListener(e, () => body.classList.remove('pressing'))
        );

        // ── Wake Lock ────────────────────────────────────────────────
        async function requestWakeLock() {
            if (!('wakeLock' in navigator)) return;
            try { wakeLockSentinel = await navigator.wakeLock.request('screen'); }
            catch (e) { console.warn('Wake Lock:', e); }
        }
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && wakeLockSentinel?.released)
                requestWakeLock();
        });
        requestWakeLock();

        // ── Mic permission pre-check ─────────────────────────────────
        navigator.permissions?.query({ name: 'microphone' })
            .then(s => {
                if (s.state === 'denied') setState('error', {
                    question: 'マイクへのアクセスが拒否されています',
                    answer:   'ブラウザ設定からマイクを許可してください',
                });
                s.onchange = () => {
                    if (s.state === 'granted' && currentState === 'error')
                        setState('idle', { question: '', answer: '' });
                };
            })
            .catch(() => {});

        // ── Speech Recognition ───────────────────────────────────────
        if (!SpeechRecognition) {
            setState('error', {
                question: 'ブラウザ非対応',
                answer:   'Chrome / Safari をご利用ください',
            });
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang            = 'ja-JP';
            recognition.interimResults  = true;
            recognition.maxAlternatives = 1;

            let isRecording = false;
            let hadResult   = false;

            micButton.addEventListener('click', () => {
                if (isRecording) {
                    recognition.stop();
                } else {
                    try { recognition.start(); }
                    catch (e) { console.error('録音開始失敗:', e); }
                }
            });

            recognition.onstart = () => {
                isRecording = true;
                hadResult   = false;
                transcriptEl.textContent = '';
                setState('recording', { question: '', answer: '' });
            };

            recognition.onresult = (event) => {
                let interim = '', final = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const t = event.results[i][0].transcript;
                    event.results[i].isFinal ? (final += t) : (interim += t);
                }
                if (interim) transcriptEl.textContent = `「${interim}」`;
                if (final) {
                    hadResult    = true;
                    lastQuestion = final;
                    transcriptEl.textContent = `「${final}」`;
                    callMiiboAPI(final);
                }
            };

            recognition.onend = () => {
                isRecording = false;
                if (currentState === 'recording' && !hadResult) {
                    setState('error', {
                        question: '音声を認識できませんでした',
                        answer:   'もう一度話しかけてください',
                    });
                    resetTimer = setTimeout(() => setState('idle', { question: '', answer: '' }), 6000);
                }
                // hadResult=true → callMiiboAPI is handling state
            };

            recognition.onerror = (event) => {
                isRecording = false;
                if (event.error === 'aborted') {
                    if (currentState === 'recording')
                        setState('idle', { question: '', answer: '' });
                    return;
                }
                const ERROR_MAP = {
                    'not-allowed':         ['マイクへのアクセスが拒否されています', 'ブラウザ設定から許可してください', 15000],
                    'service-not-allowed': ['マイクへのアクセスが拒否されています', 'HTTPSで開くか設定を確認してください', 15000],
                    'audio-capture':       ['マイクが見つかりません', 'マイク設定を確認してください', 8000],
                    'network':             ['ネットワークエラー', 'Wi-Fi接続を確認してください', 8000],
                    'no-speech':           ['声が聞こえませんでした', 'もう少し大きな声で話してください', 5000],
                };
                const [question, answer, delay] = ERROR_MAP[event.error]
                    ?? [`エラー: ${event.error}`, 'もう一度お試しください', 6000];
                setState('error', { question, answer });
                resetTimer = setTimeout(() => setState('idle', { question: '', answer: '' }), delay);
            };

            // ── miibo API call (15s timeout) ─────────────────────────
            async function callMiiboAPI(question) {
                setState('processing', { question: '', answer: '' });

                const controller = new AbortController();
                const timeoutId  = setTimeout(() => controller.abort(), 15000);

                try {
                    const res = await fetch('https://api-mebo.dev/api', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        signal: controller.signal,
                        body: JSON.stringify({
                            api_key:   MIIBO_API_KEY,
                            agent_id:  MIIBO_AGENT_ID,
                            utterance: question,
                            uid:       'nishinomiya_kitchen_tablet_01',
                        }),
                    });
                    clearTimeout(timeoutId);

                    if (!res.ok) throw new Error(`HTTP ${res.status}`);

                    const data   = await res.json();
                    const answer = data.bestResponse.utterance;

                    setState('success', {
                        question: `「${lastQuestion}」`,
                        answer: formatAnswer(answer),
                    });

                    const utterance = new SpeechSynthesisUtterance(answer);
                    utterance.lang = 'ja-JP';
                    utterance.rate = 1.1;
                    window.speechSynthesis.speak(utterance);

                    resetTimer = setTimeout(() =>
                        setState('idle', { question: '', answer: '' }), 12000);

                } catch (err) {
                    clearTimeout(timeoutId);
                    const msg = err.name === 'AbortError'
                        ? 'タイムアウトしました。もう一度押してください。'
                        : '通信エラー。Wi-Fiを確認してください。';
                    setState('error', {
                        question: lastQuestion ? `「${lastQuestion}」` : '',
                        answer: msg,
                    });
                    resetTimer = setTimeout(() =>
                        setState('idle', { question: '', answer: '' }), 8000);
                }
            }
        }
    </script>
